name: Flutter quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.5
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: >-
          dart run tool/reachable_sources.dart |
          xargs dart format --output=none --set-exit-if-changed

      - name: Analyze retained application
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

      - name: Build web debug bundle
        run: flutter build web --debug

      - name: Build Android debug APK
        run: flutter build apk --debug

  firebase:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions dependencies
        run: npm ci
        working-directory: functions

      - name: Compile Functions
        run: npm run build
        working-directory: functions

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Test Firestore security rules
        run: >-
          firebase emulators:exec --only firestore
          "npm --prefix functions test -- --runInBand"
          --project smart-app-test
